<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Details</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="team-details-container">

    <a href="index.html" class="back-btn">
      ← Back to Teams
    </a>

    <section class="team-hero">

      <img
        id="teamLogo"
        src=""
        alt="Team Logo"
        class="team-logo"
      >

      <div class="team-header">

        <h1 id="teamName">
          Loading Team...
        </h1>

        <p id="teamCode">
          Team Code
        </p>

      </div>

    </section>

    <section class="team-info">

      <div class="info-card">
        <h3>Country</h3>
        <p id="teamCountry">
          -
        </p>
      </div>

      <div class="info-card">
        <h3>National Team</h3>
        <p id="nationalTeam">
          -
        </p>
      </div>

      <div class="info-card">
        <h3>Last Updated</h3>
        <p id="updatedAt">
          -
        </p>
      </div>

    </section>

  </main>


  <section class="players-section">

  <h2>Players</h2>

  <div id="playersContainer">

    <p>Loading players...</p>

  </div>

</section>

  <script src="team.js"></script>

</body>
</html>
